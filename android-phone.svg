<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 520" width="280" height="520">
  <defs>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1020"/>
      <stop offset="100%" stop-color="#07080d"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#1c9468"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#bd7d09"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(34,211,238,0)">
        <animate attributeName="offset" values="-1;2" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="rgba(34,211,238,0.15)">
        <animate attributeName="offset" values="-0.5;2.5" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="rgba(34,211,238,0)">
        <animate attributeName="offset" values="0;3" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <clipPath id="screenClip">
      <rect x="18" y="52" width="244" height="430" rx="16"/>
    </clipPath>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Phone body -->
  <rect x="4" y="4" width="272" height="512" rx="36" fill="#0a0c15" stroke="#1a1d2e" stroke-width="1.5" filter="url(#shadow)"/>
  
  <!-- Phone frame highlight -->
  <rect x="4" y="4" width="272" height="512" rx="36" fill="none" stroke="url(#accentGrad)" stroke-width="0.5" opacity="0.3"/>

  <!-- Camera notch -->
  <circle cx="140" cy="28" r="6" fill="#0a0c15" stroke="#1a1d2e" stroke-width="1"/>
  <circle cx="140" cy="28" r="2.5" fill="#1a1d2e"/>
  <!-- Camera lens glow -->
  <circle cx="140" cy="28" r="1.5" fill="#22d3ee" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Screen area -->
  <rect x="18" y="52" width="244" height="430" rx="16" fill="url(#screenGrad)"/>
  
  <!-- Screen content (clipped) -->
  <g clip-path="url(#screenClip)">
    
    <!-- Grid pattern -->
    <g opacity="0.04">
      <line x1="18" y1="92" x2="262" y2="92" stroke="#fff" stroke-width="0.5"/>
      <line x1="18" y1="132" x2="262" y2="132" stroke="#fff" stroke-width="0.5"/>
      <line x1="18" y1="172" x2="262" y2="172" stroke="#fff" stroke-width="0.5"/>
      <line x1="18" y1="212" x2="262" y2="212" stroke="#fff" stroke-width="0.5"/>
      <line x1="18" y1="252" x2="262" y2="252" stroke="#fff" stroke-width="0.5"/>
      <line x1="18" y1="292" x2="262" y2="292" stroke="#fff" stroke-width="0.5"/>
      <line x1="78" y1="52" x2="78" y2="482" stroke="#fff" stroke-width="0.5"/>
      <line x1="140" y1="52" x2="140" y2="482" stroke="#fff" stroke-width="0.5"/>
      <line x1="202" y1="52" x2="202" y2="482" stroke="#fff" stroke-width="0.5"/>
    </g>

    <!-- Status bar -->
    <text x="34" y="72" font-family="monospace" font-size="10" fill="#8b93a8" font-weight="600">9:41</text>
    <!-- Signal -->
    <rect x="210" y="62" width="3" height="5" rx="1" fill="#8b93a8"/>
    <rect x="215" y="60" width="3" height="7" rx="1" fill="#8b93a8"/>
    <rect x="220" y="58" width="3" height="9" rx="1" fill="#8b93a8"/>
    <rect x="225" y="56" width="3" height="11" rx="1" fill="#8b93a8"/>
    <!-- Battery -->
    <rect x="235" y="60" width="18" height="9" rx="2" fill="none" stroke="#8b93a8" stroke-width="1"/>
    <rect x="253" y="63" width="2" height="3" rx="1" fill="#8b93a8"/>
    <rect x="237" y="62" width="12" height="5" rx="1" fill="#34d399">
      <animate attributeName="width" values="12;8;12" dur="8s" repeatCount="indefinite"/>
    </rect>

    <!-- App header -->
    <rect x="30" y="86" width="36" height="36" rx="10" fill="url(#accentGrad)"/>
    <text x="48" y="109" font-family="sans-serif" font-size="14" font-weight="800" fill="#07080d" text-anchor="middle">⚗</text>
    <text x="76" y="99" font-family="sans-serif" font-size="9" font-weight="600" fill="#22d3ee" letter-spacing="1.5">ANDROID ALCHEMIST</text>
    <text x="76" y="115" font-family="sans-serif" font-size="14" font-weight="800" fill="#e9edf7">Raj Kashiv</text>

    <!-- Live indicator -->
    <circle cx="226" cy="100" r="4" fill="#34d399" opacity="0.3">
      <animate attributeName="r" values="4;7;4" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="226" cy="100" r="3" fill="#34d399">
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="236" y="103" font-family="monospace" font-size="8" fill="#34d399">LIVE</text>

    <!-- Separator -->
    <line x1="30" y1="130" x2="250" y2="130" stroke="#ffffff" stroke-width="0.5" opacity="0.08"/>

    <!-- Dashboard label -->
    <text x="30" y="150" font-family="monospace" font-size="9" fill="#5a6177" letter-spacing="0.5">compose.dashboard</text>

    <!-- Animated bar chart -->
    <g transform="translate(30, 260)">
      <!-- Bar 1 -->
      <rect x="0" y="0" width="24" height="0" rx="4" fill="url(#barGrad)" opacity="0.9">
        <animate attributeName="height" values="0;55;55" dur="1.5s" fill="freeze" begin="0.3s"/>
        <animate attributeName="y" values="0;-55;-55" dur="1.5s" fill="freeze" begin="0.3s"/>
      </rect>
      <!-- Bar 2 -->
      <rect x="32" y="0" width="24" height="0" rx="4" fill="url(#barGrad)" opacity="0.9">
        <animate attributeName="height" values="0;85;85" dur="1.5s" fill="freeze" begin="0.5s"/>
        <animate attributeName="y" values="0;-85;-85" dur="1.5s" fill="freeze" begin="0.5s"/>
      </rect>
      <!-- Bar 3 -->
      <rect x="64" y="0" width="24" height="0" rx="4" fill="url(#barGrad)" opacity="0.9">
        <animate attributeName="height" values="0;62;62" dur="1.5s" fill="freeze" begin="0.7s"/>
        <animate attributeName="y" values="0;-62;-62" dur="1.5s" fill="freeze" begin="0.7s"/>
      </rect>
      <!-- Bar 4 -->
      <rect x="96" y="0" width="24" height="0" rx="4" fill="url(#barGrad)" opacity="0.9">
        <animate attributeName="height" values="0;95;95" dur="1.5s" fill="freeze" begin="0.9s"/>
        <animate attributeName="y" values="0;-95;-95" dur="1.5s" fill="freeze" begin="0.9s"/>
      </rect>
      <!-- Bar 5 -->
      <rect x="128" y="0" width="24" height="0" rx="4" fill="url(#barGrad)" opacity="0.9">
        <animate attributeName="height" values="0;72;72" dur="1.5s" fill="freeze" begin="1.1s"/>
        <animate attributeName="y" values="0;-72;-72" dur="1.5s" fill="freeze" begin="1.1s"/>
      </rect>
      <!-- Bar 6 -->
      <rect x="160" y="0" width="24" height="0" rx="4" fill="url(#barGrad)" opacity="0.9">
        <animate attributeName="height" values="0;105;105" dur="1.5s" fill="freeze" begin="1.3s"/>
        <animate attributeName="y" values="0;-105;-105" dur="1.5s" fill="freeze" begin="1.3s"/>
      </rect>
      <!-- Bar 7 -->
      <rect x="192" y="0" width="24" height="0" rx="4" fill="url(#barGrad)" opacity="0.9">
        <animate attributeName="height" values="0;80;80" dur="1.5s" fill="freeze" begin="1.5s"/>
        <animate attributeName="y" values="0;-80;-80" dur="1.5s" fill="freeze" begin="1.5s"/>
      </rect>
    </g>

    <!-- Metric pills -->
    <g transform="translate(30, 280)">
      <!-- Pill 1: 500K MAU -->
      <rect x="0" y="0" width="78" height="26" rx="7" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>
      <circle cx="14" cy="13" r="3" fill="#22d3ee"/>
      <text x="22" y="17" font-family="monospace" font-size="9" font-weight="600" fill="#e9edf7">500K MAU</text>

      <!-- Pill 2: 4.8★ -->
      <rect x="84" y="0" width="54" height="26" rx="7" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>
      <circle cx="98" cy="13" r="3" fill="#fbbf24"/>
      <text x="106" y="17" font-family="monospace" font-size="9" font-weight="600" fill="#e9edf7">4.8★</text>

      <!-- Pill 3: 60 FPS -->
      <rect x="144" y="0" width="62" height="26" rx="7" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>
      <circle cx="158" cy="13" r="3" fill="#34d399"/>
      <text x="166" y="17" font-family="monospace" font-size="9" font-weight="600" fill="#e9edf7">60 FPS</text>
    </g>

    <!-- Pill row 2 -->
    <g transform="translate(30, 312)">
      <rect x="0" y="0" width="72" height="26" rx="7" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>
      <circle cx="14" cy="13" r="3" fill="#e879f9"/>
      <text x="22" y="17" font-family="monospace" font-size="9" font-weight="600" fill="#e9edf7">−28% APK</text>

      <rect x="78" y="0" width="80" height="26" rx="7" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>
      <circle cx="92" cy="13" r="3" fill="#fb7185"/>
      <text x="100" y="17" font-family="monospace" font-size="9" font-weight="600" fill="#e9edf7">−40% Cold</text>
    </g>

    <!-- Tech badges row -->
    <g transform="translate(30, 350)">
      <text x="0" y="10" font-family="monospace" font-size="8" fill="#5a6177" letter-spacing="1">// TECH STACK</text>
      
      <rect x="0" y="18" width="40" height="20" rx="5" fill="rgba(34,211,238,0.15)" stroke="rgba(34,211,238,0.3)" stroke-width="0.5"/>
      <text x="20" y="32" font-family="monospace" font-size="8" font-weight="600" fill="#22d3ee" text-anchor="middle">Kotlin</text>

      <rect x="46" y="18" width="52" height="20" rx="5" fill="rgba(251,191,36,0.15)" stroke="rgba(251,191,36,0.3)" stroke-width="0.5"/>
      <text x="72" y="32" font-family="monospace" font-size="8" font-weight="600" fill="#fbbf24" text-anchor="middle">Compose</text>

      <rect x="104" y="18" width="32" height="20" rx="5" fill="rgba(167,139,250,0.15)" stroke="rgba(167,139,250,0.3)" stroke-width="0.5"/>
      <text x="120" y="32" font-family="monospace" font-size="8" font-weight="600" fill="#a78bfa" text-anchor="middle">MVI</text>

      <rect x="142" y="18" width="28" height="20" rx="5" fill="rgba(251,113,133,0.15)" stroke="rgba(251,113,133,0.3)" stroke-width="0.5"/>
      <text x="156" y="32" font-family="monospace" font-size="8" font-weight="600" fill="#fb7185" text-anchor="middle">Hilt</text>

      <rect x="176" y="18" width="44" height="20" rx="5" fill="rgba(232,121,249,0.15)" stroke="rgba(232,121,249,0.3)" stroke-width="0.5"/>
      <text x="198" y="32" font-family="monospace" font-size="8" font-weight="600" fill="#e879f9" text-anchor="middle">Retrofit</text>
    </g>

    <!-- Bottom CTA -->
    <rect x="30" y="400" width="220" height="38" rx="12" fill="url(#accentGrad)" opacity="0.9">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <text x="140" y="424" font-family="sans-serif" font-size="12" font-weight="700" fill="#07080d" text-anchor="middle">View Full Portfolio →</text>

    <!-- Bottom nav dots -->
    <circle cx="120" y="460" r="3" fill="#22d3ee" cy="456"/>
    <circle cx="134" y="460" r="3" fill="rgba(255,255,255,0.15)" cy="456"/>
    <circle cx="148" y="460" r="3" fill="rgba(255,255,255,0.15)" cy="456"/>
    <circle cx="162" y="460" r="3" fill="rgba(255,255,255,0.15)" cy="456"/>

    <!-- Screen shimmer overlay -->
    <rect x="18" y="52" width="244" height="430" rx="16" fill="url(#shimmer)"/>

  </g>

  <!-- Home gesture bar -->
  <rect x="100" y="492" width="80" height="4" rx="2" fill="#1a1d2e"/>

  <!-- Floating glow behind phone (ambient) -->
  <circle cx="140" cy="260" r="120" fill="#22d3ee" opacity="0.03">
    <animate attributeName="r" values="120;140;120" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.03;0.06;0.03" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>
